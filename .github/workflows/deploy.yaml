name: Deploy to Play Store

on:
  push:
    branches:
      - 'master'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Prepare signing config
        env:
          KEY: ${{ secrets.KEY }}
          BANJEN_SIGN_PWD: ${{ secrets.BANJEN_SIGN_PWD }}
          BANJEN_SIGN_ALIAS: ${{ secrets.BANJEN_SIGN_ALIAS }}
          BANJEN_ADS_UNIT_ID_BANNER: ${{ secrets.BANJEN_ADS_UNIT_ID_BANNER }}
          BANJEN_ADMOB_APP_ID: ${{ secrets.BANJEN_ADMOB_APP_ID }}
          GOOGLE_SERVICES: ${{ secrets.GOOGLE_SERVICES }}
        run: |
          echo "org.gradle.jvmargs=-Xmx2048M -Dkotlin.daemon.jvm.options=-Xmx2048M" >> gradle.properties
          echo "android.useAndroidX=true" >> gradle.properties
          echo "BANJEN_SIGN_STORE_PASSWORD=$BANJEN_SIGN_PWD" >> gradle.properties
          echo "BANJEN_SIGN_KEY_ALIAS=$BANJEN_SIGN_ALIAS" >> gradle.properties
          echo "BANJEN_SIGN_KEY_PASSWORD=$BANJEN_SIGN_PWD" >> gradle.properties
          echo "BANJEN_SIGN_PATH=key.keystore" >> gradle.properties
          echo "BANJEN_ADS_UNIT_ID_BANNER=$BANJEN_ADS_UNIT_ID_BANNER" >> gradle.properties
          echo "BANJEN_ADMOB_APP_ID=$BANJEN_ADMOB_APP_ID" >> gradle.properties

          echo "$GOOGLE_SERVICES" | base64 -d > app/google-services.json
          echo "$KEY" | base64 -d > app/key.keystore

      - name: Deploy to Play Store
        env:
          PLAY_STORE_SERVICE_ACCOUNT_JSON_B64: ${{ secrets.PLAY_STORE_SERVICE_ACCOUNT_JSON }}
        run: |
          export PLAY_STORE_SERVICE_ACCOUNT_JSON=$(echo "$PLAY_STORE_SERVICE_ACCOUNT_JSON_B64" | base64 -d)
          bundle exec fastlane android deploy

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: app-release
          path: app/build/outputs/bundle/release/app-release.aab

      - name: Clean up signing files
        if: always()
        run: rm -f app/key.keystore app/google-services.json
